<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Farshad Fahimi</title>
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <div class="brand"><img src="/assets/img/favicon.svg" alt="logo"/><span>FF / Quant</span></div>
      <div class="links">
        <a href="/">Home</a>
        <a href="/projects/">Projects</a>
        <a href="/about/">About</a>
        <a class="active" href="/contact/">Contact</a>
      </div>
    </div>

    <div class="hero">
      <div class="kicker"><span class="dot"></span> reach out</div>
      <h1>Contact</h1>
      <h2>Fastest: email. Also happy to connect on LinkedIn.</h2>

      <div class="section">
        <h3 style="margin-top:0;">Send a message</h3>
        <p style="margin:0;color:var(--muted);">
          This form goes directly to my inbox. No email address is shown publicly.
        </p>

        <!-- 1) Create a Formspree form and replace FORM_ID below -->
        <form class="form" action="https://formspree.io/f/FORM_ID" method="POST">
          <div class="form-row">
            <div>
              <label for="name">Name</label>
              <input id="name" name="name" placeholder="Your name" required />
            </div>
            <div>
              <label for="email">Email</label>
              <input id="email" name="email" type="email" placeholder="you@domain.com" required />
            </div>
          </div>

          <div>
            <label for="subject">Subject</label>
            <input id="subject" name="subject" placeholder="What’s this about?" />
          </div>

          <div>
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Write your message..." required></textarea>
          </div>

          <!-- Optional: honeypot field to reduce spam -->
          <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off" />

          <!-- Optional: redirect after submit -->
          <input type="hidden" name="_subject" value="New message from farshad-site" />
          <input type="hidden" name="_format" value="plain" />

          <button class="btn primary" type="submit">Send →</button>

          <div class="notice">
            You’ll get a confirmation after submitting. If you prefer, message me on
            <a href="https://www.linkedin.com/in/fafaimi" target="_blank" rel="noreferrer">LinkedIn</a>.
          </div>
        </form>
      </div>

      <div class="footer">
        <span><a href="/">← back</a></span>
        <span></span>
      </div>
    </div>
  </div>
</body>
</html>
